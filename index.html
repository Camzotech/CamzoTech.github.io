<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wa-green:#00a884;
  --wa-green-dark:#008069;
  --wa-green-light:#d9fdd3;
  --wa-bg:#111b21;
  --wa-panel:#202c33;
  --wa-panel2:#2a3942;
  --wa-border:#ffffff14;
  --wa-text:#e9edef;
  --wa-text2:#8696a0;
  --wa-bubble-out:#005c4b;
  --wa-bubble-in:#202c33;
  --wa-search:#2a3942;
  --wa-header:#202c33;
  --wa-tick:#53bdeb;
  --wa-unread:#00a884;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  background:var(--wa-bg);
  color:var(--wa-text);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
}

/* ── LOGIN ── */
#login-screen{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--wa-bg);
  flex-direction:column;
  gap:32px;
}
.wa-login-card{
  background:var(--wa-panel);
  border-radius:16px;
  padding:40px 44px;
  width:420px;
  text-align:center;
  animation:fadeUp .4s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wa-logo{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-bottom:28px;
}
.wa-logo-icon{
  width:52px;height:52px;
  background:var(--wa-green);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.wa-logo-text{
  font-size:28px;font-weight:600;
  color:var(--wa-text);
  letter-spacing:-.3px;
}
.wa-login-title{
  font-size:22px;font-weight:600;
  margin-bottom:8px;color:var(--wa-text);
}
.wa-login-sub{
  font-size:14px;color:var(--wa-text2);
  margin-bottom:28px;line-height:1.5;
}
.wa-input-group{margin-bottom:14px;text-align:left}
.wa-input-label{
  font-size:12px;color:var(--wa-text2);
  margin-bottom:6px;display:block;
  font-weight:500;
}
.wa-input{
  width:100%;
  background:var(--wa-search);
  border:none;
  border-bottom:2px solid var(--wa-border);
  border-radius:8px 8px 0 0;
  padding:12px 14px;
  color:var(--wa-text);
  font-family:inherit;
  font-size:15px;
  outline:none;
  transition:border-color .2s;
}
.wa-input:focus{border-bottom-color:var(--wa-green)}
.wa-btn{
  width:100%;
  padding:13px;
  border-radius:24px;
  border:none;
  background:var(--wa-green);
  color:#fff;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
  letter-spacing:.2px;
  transition:background .15s;
}
.wa-btn:hover{background:var(--wa-green-dark)}
.wa-login-footer{
  margin-top:20px;font-size:13px;color:var(--wa-text2);
}
.wa-login-footer a{color:var(--wa-green);text-decoration:none}

/* ── APP ── */
#app-screen{display:none;width:100%;height:100%}
.wa-layout{display:flex;height:100vh;width:100%}

/* ── LEFT PANEL ── */
.wa-left{
  width:30%;
  min-width:360px;
  max-width:420px;
  background:var(--wa-panel);
  border-right:1px solid var(--wa-border);
  display:flex;flex-direction:column;height:100%;
}
.wa-left-header{
  background:var(--wa-header);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  height:59px;flex-shrink:0;
}
.wa-me-avatar{
  width:40px;height:40px;border-radius:50%;
  background:#6b7c85;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;color:#fff;
  cursor:pointer;
}
.wa-header-icons{display:flex;gap:4px}
.wa-icon-btn{
  width:40px;height:40px;border-radius:50%;
  background:none;border:none;
  color:var(--wa-text2);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  transition:background .15s;
}
.wa-icon-btn:hover{background:var(--wa-panel2)}
.wa-search-wrap{
  padding:8px 12px;
  background:var(--wa-panel);
  flex-shrink:0;
}
.wa-search-inner{
  background:var(--wa-search);
  border-radius:8px;
  display:flex;align-items:center;
  padding:8px 12px;gap:10px;
}
.wa-search-icon{color:var(--wa-text2);font-size:16px;flex-shrink:0}
.wa-search-input{
  background:none;border:none;outline:none;
  color:var(--wa-text);font-family:inherit;font-size:15px;flex:1;
}
.wa-search-input::placeholder{color:var(--wa-text2)}
.wa-tabs{
  display:flex;
  border-bottom:1px solid var(--wa-border);
  background:var(--wa-panel);
  flex-shrink:0;
}
.wa-tab{
  flex:1;text-align:center;padding:10px 4px;
  font-size:13px;font-weight:500;
  color:var(--wa-text2);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
  letter-spacing:.3px;
  text-transform:uppercase;
}
.wa-tab.active{color:var(--wa-green);border-bottom-color:var(--wa-green)}

/* ── CHAT LIST ── */
.wa-chat-list{
  flex:1;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--wa-panel2) transparent;
}
.wa-chat-list::-webkit-scrollbar{width:5px}
.wa-chat-list::-webkit-scrollbar-thumb{background:var(--wa-panel2);border-radius:4px}
.wa-chat-item{
  display:flex;align-items:center;gap:13px;
  padding:10px 16px;
  cursor:pointer;
  transition:background .1s;
  border-bottom:1px solid var(--wa-border);
  position:relative;
}
.wa-chat-item:hover{background:var(--wa-panel2)}
.wa-chat-item.active{background:var(--wa-panel2)}
.wa-avatar{
  width:49px;height:49px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;color:#fff;
  position:relative;
}
.wa-avatar.online::after{
  content:'';position:absolute;
  bottom:2px;right:2px;
  width:11px;height:11px;
  background:var(--wa-green);
  border-radius:50%;border:2px solid var(--wa-panel);
}
.wa-chat-info{flex:1;min-width:0}
.wa-chat-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.wa-chat-name{font-size:17px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--wa-text)}
.wa-chat-time{font-size:12px;color:var(--wa-text2);white-space:nowrap;flex-shrink:0;margin-left:6px}
.wa-chat-time.unread-time{color:var(--wa-green)}
.wa-chat-row2{display:flex;justify-content:space-between;align-items:center}
.wa-chat-preview{font-size:14px;color:var(--wa-text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.wa-chat-preview .tick{color:var(--wa-tick);font-size:13px;margin-right:2px}
.wa-badge{
  min-width:20px;height:20px;border-radius:10px;
  background:var(--wa-unread);color:#fff;
  font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;flex-shrink:0;margin-left:6px;
}
.wa-mute-icon{color:var(--wa-text2);font-size:14px;margin-left:4px;flex-shrink:0}

/* ── RIGHT PANEL ── */
.wa-right{
  flex:1;display:flex;flex-direction:column;height:100%;
  background:var(--wa-bg);
  position:relative;
}
/* WhatsApp chat background pattern */
.wa-right::before{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='1'%3E%3Cpath d='M40 0C17.9 0 0 17.9 0 40s17.9 40 40 40 40-17.9 40-40S62.1 0 40 0zm0 72C22.3 72 8 57.7 8 40S22.3 8 40 8s32 14.3 32 32-14.3 32-32 32z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  background-size:412px;
  opacity:.06;
  pointer-events:none;
  z-index:0;
}
.wa-right>*{position:relative;z-index:1}

.wa-chat-header{
  background:var(--wa-header);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;
  height:59px;flex-shrink:0;
  border-bottom:1px solid var(--wa-border);
}
.wa-chat-header-info{flex:1;min-width:0}
.wa-chat-header-name{font-size:17px;font-weight:500;color:var(--wa-text)}
.wa-chat-header-status{font-size:13px;color:var(--wa-text2)}
.wa-chat-header-icons{display:flex;gap:2px}

/* ── MESSAGES ── */
.wa-messages{
  flex:1;overflow-y:auto;
  padding:8px 6% 8px;
  display:flex;flex-direction:column;
  scrollbar-width:thin;scrollbar-color:var(--wa-panel2) transparent;
}
.wa-messages::-webkit-scrollbar{width:5px}
.wa-messages::-webkit-scrollbar-thumb{background:var(--wa-panel2);border-radius:4px}

.wa-day-badge{
  display:flex;align-items:center;justify-content:center;
  margin:12px 0 8px;
}
.wa-day-badge span{
  background:#182229;
  color:var(--wa-text2);
  font-size:12.5px;
  padding:5px 12px;
  border-radius:7px;
  font-weight:500;
  box-shadow:0 1px 2px rgba(0,0,0,.4);
}

.wa-msg-group{display:flex;flex-direction:column;margin-bottom:2px}
.wa-msg-group.out{align-items:flex-end}
.wa-msg-group.in{align-items:flex-start}

.wa-sender-name{
  font-size:13px;font-weight:500;
  margin-bottom:2px;padding:0 12px;
}

.wa-bubble{
  max-width:65%;
  padding:6px 7px 8px 9px;
  border-radius:7.5px;
  font-size:14.2px;
  line-height:1.42;
  word-break:break-word;
  position:relative;
  box-shadow:0 1px 2px rgba(0,0,0,.3);
  margin-bottom:2px;
}
.wa-msg-group.out .wa-bubble{
  background:var(--wa-bubble-out);
  color:#e9edef;
  border-top-right-radius:2px;
}
.wa-msg-group.in .wa-bubble{
  background:var(--wa-bubble-in);
  color:#e9edef;
  border-top-left-radius:2px;
}
/* Tail for first bubble in group */
.wa-msg-group.out .wa-bubble:first-of-type::after{
  content:'';position:absolute;
  top:0;right:-8px;
  width:0;height:0;
  border-left:8px solid var(--wa-bubble-out);
  border-top:8px solid transparent;
}
.wa-msg-group.in .wa-bubble:first-of-type::after{
  content:'';position:absolute;
  top:0;left:-8px;
  width:0;height:0;
  border-right:8px solid var(--wa-bubble-in);
  border-top:8px solid transparent;
}

.wa-bubble-meta{
  display:flex;align-items:flex-end;justify-content:flex-end;
  gap:3px;margin-top:1px;margin-left:8px;float:right;
  clear:right;
}
.wa-bubble-time{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap}
.wa-tick-icon{font-size:13px;color:var(--wa-tick)}

/* ── INPUT BAR ── */
.wa-input-bar{
  padding:8px 16px;
  background:var(--wa-header);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;min-height:62px;
}
.wa-msg-input-wrap{
  flex:1;
  background:var(--wa-search);
  border-radius:21px;
  display:flex;align-items:center;
  padding:9px 14px;gap:10px;
}
.wa-msg-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--wa-text);font-family:inherit;font-size:15px;
  resize:none;max-height:100px;line-height:1.4;
}
.wa-msg-input::placeholder{color:var(--wa-text2)}
.wa-emoji-btn,.wa-attach-btn{
  color:var(--wa-text2);font-size:22px;
  background:none;border:none;cursor:pointer;flex-shrink:0;
  padding:2px;transition:color .15s;
}
.wa-emoji-btn:hover,.wa-attach-btn:hover{color:var(--wa-text)}
.wa-send-btn{
  width:48px;height:48px;border-radius:50%;
  background:var(--wa-green);border:none;
  color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.wa-send-btn:hover{background:var(--wa-green-dark)}

/* ── EMPTY STATE ── */
.wa-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--wa-text2);gap:16px;
  background:transparent;
}
.wa-empty-icon{font-size:80px;opacity:.15}
.wa-empty-title{font-size:32px;font-weight:300;color:var(--wa-text);opacity:.7}
.wa-empty-sub{font-size:14px;text-align:center;max-width:280px;line-height:1.5}
.wa-empty-lock{font-size:12px;color:var(--wa-text2);display:flex;align-items:center;gap:5px;opacity:.6}

/* ── ENCRYPT BANNER ── */
.wa-encrypt-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:#182229;
  color:var(--wa-text2);
  font-size:12.5px;
  padding:7px 16px;
  margin:8px auto;
  border-radius:7px;
  max-width:380px;
  text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="wa-login-card">
    <div class="wa-logo">
      <div class="wa-logo-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.001 2.002c-5.514 0-9.998 4.484-9.998 9.998 0 1.76.46 3.411 1.269 4.847L2.002 22l5.277-1.248A9.96 9.96 0 0012.001 22c5.514 0 9.997-4.484 9.997-9.998 0-5.516-4.483-10-9.997-10zm0 18.343a8.32 8.32 0 01-4.247-1.162l-.305-.181-3.133.741.766-3.056-.2-.315A8.33 8.33 0 013.671 12c0-4.594 3.737-8.331 8.33-8.331 4.594 0 8.33 3.737 8.33 8.331 0 4.594-3.736 8.343-8.33 8.343z"/></svg>
      </div>
      <span class="wa-logo-text">WhatsApp</span>
    </div>
    <div class="wa-login-title">Sign in to WhatsApp</div>
    <div class="wa-login-sub">Enter your phone number and password to continue</div>
    <div class="wa-input-group">
      <label class="wa-input-label">Phone number or email</label>
      <input class="wa-input" type="text" id="login-user" value="+1 (555) 012-3456" autocomplete="off">
    </div>
    <div class="wa-input-group">
      <label class="wa-input-label">Password</label>
      <input class="wa-input" type="password" id="login-pass" value="mypassword">
    </div>
    <button class="wa-btn" onclick="doLogin()">NEXT</button>
    <div class="wa-login-footer">Don't have an account? <a href="#">Register</a></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="wa-layout">

    <!-- LEFT -->
    <div class="wa-left">
      <div class="wa-left-header">
        <div class="wa-me-avatar">A</div>
        <div class="wa-header-icons">
          <button class="wa-icon-btn" title="Communities">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/></svg>
          </button>
          <button class="wa-icon-btn" title="New chat">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.005 3.175H4.674C3.642 3.175 3 3.789 3 4.821V21.02l3.544-3.514h12.461c1.033 0 2.064-1.06 2.064-2.093V4.821c-.001-1.032-1.032-1.646-2.064-1.646zm-4.989 9.869H7.069v-2.084h6.947v2.084zm3-4H7.069V6.939h9.947v2.105z"/></svg>
          </button>
          <button class="wa-icon-btn" title="Menu">⋮</button>
        </div>
      </div>
      <div class="wa-search-wrap">
        <div class="wa-search-inner">
          <span class="wa-search-icon">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3 0-3.7-3-6.7-6.7-6.7S3 6 3 9.7s3 6.7 6.7 6.7c1.6 0 3.2-.6 4.3-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5-5.2zm-6.2 0c-2.6 0-4.6-2.1-4.6-4.6s2.1-4.6 4.6-4.6 4.6 2.1 4.6 4.6-2 4.6-4.6 4.6z"/></svg>
          </span>
          <input class="wa-search-input" type="text" placeholder="Search or start new chat" oninput="filterChats(this.value)">
        </div>
      </div>
      <div class="wa-tabs">
        <div class="wa-tab active" onclick="switchTab(this,'all')">All</div>
        <div class="wa-tab" onclick="switchTab(this,'unread')">Unread</div>
        <div class="wa-tab" onclick="switchTab(this,'groups')">Groups</div>
      </div>
      <div class="wa-chat-list" id="chat-list"></div>
    </div>

    <!-- RIGHT -->
    <div class="wa-right">
      <div class="wa-empty" id="empty-state">
        <div class="wa-empty-icon">
          <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor" opacity=".15"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.001 2.002c-5.514 0-9.998 4.484-9.998 9.998 0 1.76.46 3.411 1.269 4.847L2.002 22l5.277-1.248A9.96 9.96 0 0012.001 22c5.514 0 9.997-4.484 9.997-9.998 0-5.516-4.483-10-9.997-10z"/></svg>
        </div>
        <div class="wa-empty-title">WhatsApp Web</div>
        <div class="wa-empty-sub">Send and receive messages without keeping your phone online.</div>
        <div class="wa-empty-lock">🔒 Your personal messages are end-to-end encrypted</div>
      </div>
      <div id="chat-view" style="display:none;flex-direction:column;height:100%">
        <div class="wa-chat-header">
          <div class="wa-avatar" id="panel-avatar"></div>
          <div class="wa-chat-header-info">
            <div class="wa-chat-header-name" id="panel-name"></div>
            <div class="wa-chat-header-status" id="panel-status"></div>
          </div>
          <div class="wa-chat-header-icons">
            <button class="wa-icon-btn">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3 0-3.7-3-6.7-6.7-6.7S3 6 3 9.7s3 6.7 6.7 6.7c1.6 0 3.2-.6 4.3-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5-5.2zm-6.2 0c-2.6 0-4.6-2.1-4.6-4.6s2.1-4.6 4.6-4.6 4.6 2.1 4.6 4.6-2 4.6-4.6 4.6z"/></svg>
            </button>
            <button class="wa-icon-btn" onclick="doLogout()" title="Log out">⋮</button>

// group sender colors for group chats
const SENDER_COLORS=['#e06c5a','#6b9fd4','#7bc67e','#e8b86a','#a07cbd','#6bbdc6'];
const senderColorMap={};
function getSenderColor(name){
  if(!senderColorMap[name]) senderColorMap[name]=SENDER_COLORS[Object.keys(senderColorMap).length%SENDER_COLORS.length];
  return senderColorMap[name];
}

let activeId=null, currentTab='all';

function switchTab(el,tab){
  document.querySelectorAll('.wa-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); currentTab=tab; renderList();
}

function renderList(filter=''){
  const list=document.getElementById('chat-list');
  list.innerHTML='';
  let contacts=[...C];
  if(currentTab==='unread') contacts=contacts.filter(c=>c.un>0);
  if(currentTab==='groups') contacts=contacts.filter(c=>c.grp);
  if(filter) contacts=contacts.filter(c=>
    c.name.toLowerCase().includes(filter.toLowerCase())||
    c.pr.toLowerCase().includes(filter.toLowerCase())
  );
  if(!contacts.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--wa-text2);font-size:14px">No chats found</div>';
    return;
  }
  contacts.forEach(c=>{
    const el=document.createElement('div');
    el.className='wa-chat-item'+(activeId===c.id?' active':'');
    el.onclick=()=>openChat(c.id);
    const ini=initials(c.name);
    const hasUnread=c.un>0;
    el.innerHTML=`
      <div class="wa-avatar ${c.on?'online':''}" style="background:${c.col};font-size:${ini.length===1?'22px':'18px'}">${ini}</div>
      <div class="wa-chat-info">
        <div class="wa-chat-row1">
          <span class="wa-chat-name">${c.name}</span>
          <span class="wa-chat-time ${hasUnread&&!c.muted?'unread-time':''}">${c.tm}</span>
        </div>
        <div class="wa-chat-row2">
          <span class="wa-chat-preview">${!c.grp?'<span class="tick">✓✓</span>':''} ${c.pr}</span>
          ${c.muted?`<span class="wa-mute-icon">🔇</span>`:''}
          ${hasUnread?`<div class="wa-badge" style="${c.muted?'background:#8696a0':''}">${c.un>99?'99+':c.un}</div>`:''}
        </div>
      </div>
    `;
    list.appendChild(el);
  });
}

function openChat(id){
  activeId=id;
  const contact=C.find(c=>c.id===id);
  contact.un=0; renderList();
  const ini=initials(contact.name);
  const pa=document.getElementById('panel-avatar');
  Object.assign(pa.style,{
    background:contact.col,width:'40px',height:'40px',borderRadius:'50%',
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:ini.length===1?'18px':'15px',fontWeight:'600',color:'#fff',flexShrink:'0'
  });
  pa.textContent=ini;
  document.getElementById('panel-name').textContent=contact.name;
  const st=document.getElementById('panel-status');
  if(contact.grp){
    st.textContent='Alex Johnson, '+contact.name.replace(/[^\w\s,]/g,'').trim();
    st.style.color='var(--wa-text2)';
  } else {
    st.textContent=contact.on?'online':'last seen today at '+['8:42 AM','9:15 AM','11:03 AM','2:27 PM','4:56 PM'][id%5];
    st.style.color=contact.on?'var(--wa-green)':'var(--wa-text2)';
  }
  const msgs=V[id]||[];
  const box=document.getElementById('messages');
  box.innerHTML='';
  // encryption banner at top
  const banner=document.createElement('div');
  banner.className='wa-encrypt-bar';
  banner.innerHTML='🔒 Messages and calls are end-to-end encrypted. No one outside of this chat, not even WhatsApp, can read or listen to them.';
  box.appendChild(banner);
  let lastDay=null,lastKey=null,lastGroup=null;
  msgs.forEach(m=>{
    const dir=m.o?'out':'in';
    if(m.d!==lastDay){
      const dv=document.createElement('div');
      dv.className='wa-day-badge';
      dv.innerHTML=`<span>${m.d}</span>`;
      box.appendChild(dv); lastDay=m.d; lastKey=null; lastGroup=null;
    }
    const key=dir+(m.n||'');
    if(key!==lastKey){
      const g=document.createElement('div');
      g.className='wa-msg-group '+dir;
      if(!m.o&&m.n&&contact.grp){
        const sn=document.createElement('div');
        sn.className='wa-sender-name';
        sn.style.color=getSenderColor(m.n);
        sn.textContent=m.n;
        g.appendChild(sn);
      }
      box.appendChild(g); lastGroup=g; lastKey=key;
    }
    const b=document.createElement('div');
    b.className='wa-bubble';
    const msgText=document.createElement('span');
    msgText.textContent=m.m;
    b.appendChild(msgText);
    const meta=document.createElement('div');
    meta.className='wa-bubble-meta';
    const timeEl=document.createElement('span');
    timeEl.className='wa-bubble-time';
    timeEl.textContent=m.t;
    meta.appendChild(timeEl);
    if(m.o){
      const tick=document.createElement('span');
      tick.className='wa-tick-icon';
      tick.textContent='✓✓';
      meta.appendChild(tick);
    }
    b.appendChild(meta);
    lastGroup.appendChild(b);
  });
  document.getElementById('empty-state').style.display='none';
  const cv=document.getElementById('chat-view');
  cv.style.display='flex'; box.scrollTop=box.scrollHeight;
}

function doLogin(){
  const u=document.getElementById('login-user').value;
  const p=document.getElementById('login-pass').value;
  if(!u||!p) return;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  renderList();
}

function doLogout(){
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  activeId=null;
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('chat-view').style.display='none';
}

function filterChats(v){renderList(v);}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
});
</script>
